name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 0,12 * * *"   # regenerates twice daily
  workflow_dispatch:            # also runnable manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Pac-Man SVG
        uses: abozanona/pacman-contribution-graph@v1.0
        with:
          github-user: WhyILived

      - name: Commit generated SVGs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: regenerate pac-man graph [skip ci]"
