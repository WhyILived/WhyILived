  <circle class="sb" cx="44"  cy="105" r="0.5" style="animation-delay:3.5s"/>
  <circle class="sd" cx="90"  cy="135" r="0.7" style="animation-delay:1.2s"/>
  <circle class="sa" cx="54"  cy="162" r="0.5" style="animation-delay:.8s"/>
  <circle class="sc" cx="36"  cy="195" r="0.4" style="animation-delay:3.0s"/>
  <circle class="sd" cx="110" cy="60"  r="0.6" style="animation-delay:2.2s"/>
  <circle class="sa" cx="145" cy="100" r="0.5" style="animation-delay:1.6s"/>
  <circle class="sb" cx="168" cy="148" r="0.6" style="animation-delay:3.3s"/>
  <circle class="sd" cx="822" cy="58"  r="0.7" style="animation-delay:2.9s"/>
