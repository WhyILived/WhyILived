<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06080f"/>
      <stop offset="18%"  stop-color="#0a0d1e"/>
      <stop offset="38%"  stop-color="#0e0826"/>
      <stop offset="55%"  stop-color="#1c0d2e"/>
      <stop offset="68%"  stop-color="#2e1008"/>
      <stop offset="80%"  stop-color="#4a1e04"/>
      <stop offset="91%"  stop-color="#5c2800"/>
      <stop offset="100%" stop-color="#280d00"/>
    </linearGradient>
    <radialGradient id="nebula" cx="62%" cy="22%" r="44%">
      <stop offset="0%"   stop-color="#162040" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a0d1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizon-glow" cx="50%" cy="100%" r="58%">
      <stop offset="0%"   stop-color="#d46414" stop-opacity="0.32"/>
      <stop offset="42%"  stop-color="#8b3800" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3d1400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8d488" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c8b060" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="apex-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="moon-glow-f" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="haze-f" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="haze-f2" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      @keyframes tw-a { 0%,100%{opacity:.12} 50%{opacity:.8}  }
      @keyframes tw-b { 0%,100%{opacity:.22} 50%{opacity:1}   }
      @keyframes tw-c { 0%,100%{opacity:.06} 50%{opacity:.6}  }
      @keyframes apex-pulse { 0%,100%{opacity:.75} 50%{opacity:1} }
      @keyframes moon-pulse { 0%,100%{opacity:.85} 50%{opacity:1} }
      @keyframes haze-a { 0%,100%{opacity:.10;transform:translateX(0)}  50%{opacity:.19;transform:translateX(8px)}  }
      @keyframes haze-b { 0%,100%{opacity:.07;transform:translateX(0)}  50%{opacity:.14;transform:translateX(-7px)} }
      @keyframes haze-c { 0%,100%{opacity:.05;transform:translateX(0)}  50%{opacity:.11;transform:translateX(5px)}  }
      .sa { fill:#e8f4f8; animation:tw-a 3.1s ease-in-out infinite; }
      .sb { fill:#58a6ff; animation:tw-b 2.3s ease-in-out infinite; }
      .sc { fill:#e6b450; animation:tw-c 1.9s ease-in-out infinite; }
      .sd { fill:#ffffff;  animation:tw-a 4.3s ease-in-out infinite; }
      .apex-badge { animation:apex-pulse 3s ease-in-out infinite; }
      .moon-el { animation:moon-pulse 4s ease-in-out infinite; }
      .ha { animation:haze-a 9s  ease-in-out infinite; }
      .hb { animation:haze-b 13s ease-in-out infinite; }
      .hc { animation:haze-c 7s  ease-in-out infinite; }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="380" fill="url(#sky)"/>
  <rect width="900" height="380" fill="url(#nebula)"/>
  <rect width="900" height="380" fill="url(#horizon-glow)"/>

  <!-- STARS -->
  <circle class="sa" cx="18"  cy="14"  r="0.7" style="animation-delay:.3s"/>
  <circle class="sd" cx="64"  cy="9"   r="0.5" style="animation-delay:1.2s"/>
  <circle class="sb" cx="120" cy="20"  r="0.6" style="animation-delay:2.5s"/>
  <circle class="sa" cx="182" cy="8"   r="0.8" style="animation-delay:.7s"/>
  <circle class="sc" cx="238" cy="22"  r="0.5" style="animation-delay:3.1s"/>
  <circle class="sd" cx="298" cy="12"  r="0.7" style="animation-delay:1.8s"/>
