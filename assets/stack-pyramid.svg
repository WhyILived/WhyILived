  <circle cx="102" cy="30"  r="1.5" fill="#58a6ff" filter="url(#glow)" style="animation:tw-b 2.8s ease-in-out .4s infinite"/>
  <circle cx="798" cy="36"  r="1.4" fill="#e6b450" filter="url(#glow)" style="animation:tw-c 3.2s ease-in-out 1.9s infinite"/>
  <circle cx="848" cy="150" r="1.2" fill="#58a6ff" filter="url(#glow)" style="animation:tw-b 3.6s ease-in-out 2.3s infinite"/>
  <circle cx="55"  cy="185" r="1.1" fill="#8b5cf6" filter="url(#glow)" style="animation:tw-a 2.5s ease-in-out .7s infinite"/>

