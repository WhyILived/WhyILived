  <ellipse class="hb" cx="450"  cy="224" rx="280" ry="20" fill="#b8c8e0" filter="url(#haze-f)"  opacity="0.06"/>
  <ellipse cx="450" cy="338" rx="380" ry="46" fill="#c86014" filter="url(#haze-f)" opacity="0.11"/>

