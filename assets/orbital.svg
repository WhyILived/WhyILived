  <circle class="sa" cx="708" cy="7"   r="0.6" style="animation-delay:3.4s"/>
  <circle class="sc" cx="762" cy="19"  r="0.5" style="animation-delay:1.0s"/>
  <circle class="sd" cx="818" cy="10"  r="0.7" style="animation-delay:2.7s"/>
  <circle class="sa" cx="866" cy="15"  r="0.6" style="animation-delay:.6s"/>

  <circle class="sc" cx="28"  cy="48"  r="0.6" style="animation-delay:2.0s"/>
  <circle class="sa" cx="70"  cy="65"  r="0.8" style="animation-delay:.5s"/>
  <circle class="sb" cx="42"  cy="95"  r="0.5" style="animation-delay:3.5s"/>
  <circle class="sd" cx="88"  cy="120" r="0.7" style="animation-delay:1.2s"/>
  <circle class="sa" cx="52"  cy="148" r="0.6" style="animation-delay:.8s"/>
  <circle class="sc" cx="35"  cy="178" r="0.5" style="animation-delay:3.0s"/>
  <circle class="sb" cx="62"  cy="210" r="0.7" style="animation-delay:1.7s"/>
  <circle class="sa" cx="40"  cy="238" r="0.6" style="animation-delay:.3s"/>
  <circle class="sd" cx="78"  cy="262" r="0.5" style="animation-delay:2.4s"/>
  <circle class="sc" cx="48"  cy="290" r="0.7" style="animation-delay:1.1s"/>
  <circle class="sa" cx="82"  cy="318" r="0.6" style="animation-delay:3.8s"/>
  <circle class="sb" cx="25"  cy="342" r="0.5" style="animation-delay:.6s"/>

  <circle class="sd" cx="820" cy="55"  r="0.7" style="animation-delay:2.9s"/>
  <circle class="sa" cx="852" cy="80"  r="0.5" style="animation-delay:1.4s"/>
  <circle class="sb" cx="830" cy="108" r="0.6" style="animation-delay:.2s"/>
  <circle class="sc" cx="866" cy="135" r="0.8" style="animation-delay:3.2s"/>
  <circle class="sa" cx="840" cy="162" r="0.5" style="animation-delay:1.9s"/>
  <circle class="sd" cx="872" cy="190" r="0.7" style="animation-delay:.7s"/>
  <circle class="sb" cx="845" cy="218" r="0.6" style="animation-delay:2.6s"/>
  <circle class="sc" cx="865" cy="248" r="0.5" style="animation-delay:1.3s"/>
  <circle class="sa" cx="834" cy="276" r="0.7" style="animation-delay:3.7s"/>
  <circle class="sd" cx="858" cy="305" r="0.6" style="animation-delay:.4s"/>
  <circle class="sb" cx="876" cy="332" r="0.5" style="animation-delay:2.1s"/>
  <circle class="sc" cx="825" cy="352" r="0.7" style="animation-delay:1.6s"/>

  <circle class="sb" cx="22"  cy="354" r="0.6" style="animation-delay:3.4s"/>
  <circle class="sa" cx="78"  cy="358" r="0.5" style="animation-delay:.9s"/>
  <circle class="sc" cx="140" cy="348" r="0.8" style="animation-delay:2.3s"/>
  <circle class="sd" cx="220" cy="355" r="0.6" style="animation-delay:1.0s"/>
  <circle class="sa" cx="310" cy="350" r="0.5" style="animation-delay:3.6s"/>
  <circle class="sb" cx="590" cy="352" r="0.6" style="animation-delay:.5s"/>
  <circle class="sc" cx="680" cy="348" r="0.7" style="animation-delay:2.8s"/>
  <circle class="sd" cx="768" cy="355" r="0.5" style="animation-delay:1.2s"/>
  <circle class="sa" cx="856" cy="350" r="0.7" style="animation-delay:.1s"/>

  <!-- Accent stars (larger, glowing) -->
  <circle cx="108" cy="42"  r="1.5" fill="#58a6ff" filter="url(#glow)" style="animation:tw-b 2.8s ease-in-out .4s infinite"/>
  <circle cx="792" cy="48"  r="1.4" fill="#e6b450" filter="url(#glow)" style="animation:tw-c 3.2s ease-in-out 1.9s infinite"/>
  <circle cx="58"  cy="302" r="1.5" fill="#8b5cf6" filter="url(#glow)" style="animation:tw-a 2.5s ease-in-out .7s infinite"/>
  <circle cx="845" cy="315" r="1.6" fill="#58a6ff" filter="url(#glow)" style="animation:tw-b 3.6s ease-in-out 2.3s infinite"/>
  <circle cx="150" cy="340" r="1.3" fill="#e6b450" filter="url(#glow)" style="animation:tw-c 2.1s ease-in-out .1s infinite"/>

  <!-- ── Orbit ring (circle, r=130, centre 450,185) ──── -->
  <circle class="orbit-ring" cx="450" cy="185" r="130"
          fill="none" stroke="#1a2a3a" stroke-width="0.9"/>

  <!-- Tick marks at 30° intervals (12 ticks) -->
  <!-- tick: inner at r=125, outer at r=135 -->
  <!-- a=-90°: (450,60)→(450,50)  a=-60°: (515,73)→(520,64)  etc. -->
  <line x1="450" y1="60"  x2="450" y2="50"  stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="515" y1="73"  x2="520" y2="64"  stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="563" y1="120" x2="571" y2="114" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="580" y1="185" x2="590" y2="185" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="563" y1="250" x2="571" y2="256" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="515" y1="297" x2="520" y2="306" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="450" y1="310" x2="450" y2="320" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="385" y1="297" x2="380" y2="306" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="337" y1="250" x2="329" y2="256" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="320" y1="185" x2="310" y2="185" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="337" y1="120" x2="329" y2="114" stroke="#1e3a4a" stroke-width="0.7"/>
  <line x1="385" y1="73"  x2="380" y2="64"  stroke="#1e3a4a" stroke-width="0.7"/>

  <!-- ── Central star ─────────────────────────────────── -->
  <circle class="star-corona" cx="450" cy="185" r="28" fill="url(#star-halo)" filter="url(#star-glow)"/>
  <circle class="star-halo"   cx="450" cy="185" r="15" fill="url(#star-halo)" filter="url(#glow)"/>
  <circle class="star-core"   cx="450" cy="185" r="7"  fill="url(#star-core)"/>

  <!-- ══════════════════════════════════════════════════
       PLANETS — 12 months, sized by contribution count
       Position formula: px=450+130*cos(a), py=185+130*sin(a)
       where a = -90 + i*30 degrees

       Label offsets: lx = px+(r+22)*cos(a), ly = py+(r+22)*sin(a)
       ══════════════════════════════════════════════════ -->

  <!-- i=0  Apr '26  90 commits  r=8   a=-90°  pos=(450,55)   label=(450,25) -->
  <circle class="planet" cx="450" cy="55"  r="8"  fill="#58a6ff" filter="url(#glow)" style="animation-delay:0s"/>
  <text text-anchor="middle" x="450" y="24">
    <tspan class="label">Apr '26</tspan>
    <tspan class="label-count" dx="4">90</tspan>
  </text>

  <!-- i=1  Mar '26  115 commits r=10  a=-60°  pos=(515,72)   label=(531,47) -->
  <circle class="planet" cx="515" cy="72"  r="10" fill="#79c0ff" filter="url(#glow)" style="animation-delay:.4s"/>
  <text text-anchor="start" x="531" y="50">
    <tspan class="label">Mar '26</tspan>
    <tspan class="label-count" dx="4">115</tspan>
  </text>

  <!-- i=2  Feb '26  70 commits  r=6   a=-30°  pos=(563,120)  label=(583,107) -->
  <circle class="planet" cx="563" cy="120" r="6"  fill="#a5d6ff" filter="url(#glow)" style="animation-delay:.8s"/>
  <text text-anchor="start" x="583" y="111">
    <tspan class="label">Feb '26</tspan>
    <tspan class="label-count" dx="4">70</tspan>
  </text>

  <!-- i=3  Jan '26  105 commits r=9   a=0°    pos=(580,185)  label=(609,185) -->
  <circle class="planet" cx="580" cy="185" r="9"  fill="#e6b450" filter="url(#glow)" style="animation-delay:1.2s"/>
  <text text-anchor="start" x="609" y="189">
    <tspan class="label">Jan '26</tspan>
    <tspan class="label-count" dx="4">105</tspan>
  </text>

  <!-- i=4  Dec '25  45 commits  r=4   a=30°   pos=(563,250)  label=(581,261) -->
  <circle class="planet" cx="563" cy="250" r="4"  fill="#ffa657" filter="url(#glow)" style="animation-delay:1.6s"/>
  <text text-anchor="start" x="581" y="264">
    <tspan class="label">Dec '25</tspan>
    <tspan class="label-count" dx="4">45</tspan>
  </text>

  <!-- i=5  Nov '25  80 commits  r=7   a=60°   pos=(515,297)  label=(528,323) -->
  <circle class="planet" cx="515" cy="297" r="7"  fill="#d2a8ff" filter="url(#glow)" style="animation-delay:2.0s"/>
  <text text-anchor="start" x="528" y="326">
    <tspan class="label">Nov '25</tspan>
    <tspan class="label-count" dx="4">80</tspan>
  </text>

  <!-- i=6  Oct '25  125 commits r=11  a=90°   pos=(450,315)  label=(450,347) -->
  <circle class="planet" cx="450" cy="315" r="11" fill="#bc8cff" filter="url(#glow)" style="animation-delay:2.4s"/>
  <text text-anchor="middle" x="450" y="350">
    <tspan class="label">Oct '25</tspan>
