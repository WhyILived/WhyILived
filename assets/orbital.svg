<!--
  ORBITAL TELEMETRY — WhyILived
  12 planets = last 12 months. Planet size ∝ contribution count.
  DATA (placeholder — update via GitHub Action or manually):
    i=0  Apr '26  90   r=8   #58a6ff
    i=1  Mar '26  115  r=10  #79c0ff
    i=2  Feb '26  70   r=6   #a5d6ff
    i=3  Jan '26  105  r=9   #e6b450
    i=4  Dec '25  45   r=4   #ffa657
    i=5  Nov '25  80   r=7   #d2a8ff
    i=6  Oct '25  125  r=11  #bc8cff
    i=7  Sep '25  60   r=5   #39d353
    i=8  Aug '25  85   r=7   #56d364
    i=9  Jul '25  35   r=3   #ff7b72
    i=10 Jun '25  70   r=6   #ffa198
    i=11 May '25  50   r=4   #9b8cff

  Orbit: circle cx=450 cy=185 r=130. Centre star: (450, 185).
  Planet positions: angle = -90 + i*30 deg
    px = 450 + 130*cos(angle_rad)
    py = 185 + 130*sin(angle_rad)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 365" width="100%">
  <defs>
    <radialGradient id="star-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffde7"/>
      <stop offset="35%"  stop-color="#e6b450"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e6b450" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes tw-a { 0%,100%{opacity:.12} 50%{opacity:.85} }
      @keyframes tw-b { 0%,100%{opacity:.22} 50%{opacity:1}   }
      @keyframes tw-c { 0%,100%{opacity:.06} 50%{opacity:.6}  }
      @keyframes s-pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
      @keyframes halo    { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:.5;transform:scale(1.2)} }
      @keyframes corona  { 0%,100%{opacity:.08} 50%{opacity:.22} }
      @keyframes p-glow  { 0%,100%{opacity:.72} 50%{opacity:1}   }
      @keyframes ring    { 0%,100%{opacity:.35} 50%{opacity:.55} }
      @keyframes footer  { 0%,100%{opacity:.3}  50%{opacity:.55} }

      .sa { fill:#e8f4f8; animation:tw-a 3.1s ease-in-out infinite; }
      .sb { fill:#58a6ff; animation:tw-b 2.3s ease-in-out infinite; }
      .sc { fill:#e6b450; animation:tw-c 1.9s ease-in-out infinite; }
      .sd { fill:#ffffff;  animation:tw-a 4.3s ease-in-out infinite; }

      .star-corona { transform-box:fill-box; transform-origin:center; animation:corona  3s ease-in-out infinite; }
      .star-halo   { transform-box:fill-box; transform-origin:center; animation:halo    3s ease-in-out infinite; }
      .star-core   { transform-box:fill-box; transform-origin:center; animation:s-pulse 3s ease-in-out infinite; }

      .orbit-ring { animation:ring   4s ease-in-out infinite; }
      .planet     { animation:p-glow 3s ease-in-out infinite; }
      .foot       { animation:footer 5s ease-in-out infinite; }
      .label      { fill:#8b949e; font-family:monospace; font-size:8px; }
      .label-count{ fill:#58a6ff; font-family:monospace; font-size:8px; }
    </style>
  </defs>

  <!-- ── Background ─────────────────────────────────── -->
  <rect width="900" height="365" fill="#0d1117"/>

  <!-- ── Star field ──────────────────────────────────── -->
  <!-- Outer ring — away from orbit area (r>155 from centre 450,185) -->
  <circle class="sa" cx="18"  cy="12"  r="0.7" style="animation-delay:.3s"/>
  <circle class="sd" cx="62"  cy="8"   r="0.5" style="animation-delay:1.2s"/>
  <circle class="sb" cx="118" cy="18"  r="0.6" style="animation-delay:2.5s"/>
  <circle class="sa" cx="178" cy="7"   r="0.8" style="animation-delay:.7s"/>
  <circle class="sc" cx="234" cy="20"  r="0.5" style="animation-delay:3.1s"/>
  <circle class="sd" cx="292" cy="11"  r="0.7" style="animation-delay:1.8s"/>
  <circle class="sa" cx="352" cy="6"   r="0.6" style="animation-delay:.4s"/>
  <circle class="sb" cx="412" cy="16"  r="0.5" style="animation-delay:2.9s"/>
