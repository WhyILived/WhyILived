  ORBITAL TELEMETRY — WhyILived
  Auto-updated by scripts/update-orbital.py via GitHub Actions (runs 1st of each month).

  Geometry: centre (450, 220), orbit r=130, viewBox 900×430
  Planet ordering: i=0 = current month at 12-o'clock (-90°), subsequent months
  go counter-clockwise (i=1 is upper-left, i=2 upper-right of left, etc.).
  Angle formula: a = -90 - i×30°
  Planet radius: scaled linearly between r=3 (min month) and r=12 (max month).

  DATA (placeholder — script overwrites BEGIN_PLANETS … END_PLANETS block):
    i=0  Apr '26  90c  r=8
    i=1  Mar '26  115c r=10
    i=2  Feb '26  70c  r=6
    i=3  Jan '26  105c r=9
    i=4  Dec '25  45c  r=4
    i=5  Nov '25  80c  r=7
    i=6  Oct '25  125c r=11
    i=7  Sep '25  60c  r=5
    i=8  Aug '25  85c  r=7
    i=9  Jul '25  35c  r=3
    i=10 Jun '25  70c  r=6
    i=11 May '25  50c  r=4
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="100%">
