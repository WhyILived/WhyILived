  <!-- i=11 May '25  50 commits  r=4   a=240°  pos=(385,72)   label=(373,51) -->
  <circle class="planet" cx="385" cy="72"  r="4"  fill="#9b8cff" filter="url(#glow)" style="animation-delay:4.4s"/>
  <text text-anchor="end" x="373" y="51">
    <tspan class="label">May '25</tspan>
    <tspan class="label-count" dx="4">50</tspan>
  </text>

  <!-- ── Footer label ──────────────────────────────────── -->
  <text class="foot" x="450" y="362" text-anchor="middle"
        font-family="monospace" font-size="8" fill="#8b949e" letter-spacing="2">
    CONTRIBUTIONS TELEMETRY · SYSTEM WhyILived · LAST 12 MONTHS
  </text>
</svg>
