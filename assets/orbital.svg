  </text>

  <!-- i=7  Sep '25  60 commits  r=5   a=120°  pos=(385,297)  label=(372,324) -->
  <circle class="planet" cx="385" cy="297" r="5"  fill="#39d353" filter="url(#glow)" style="animation-delay:2.8s"/>
  <text text-anchor="end" x="372" y="326">
    <tspan class="label">Sep '25</tspan>
    <tspan class="label-count" dx="4">60</tspan>
  </text>

