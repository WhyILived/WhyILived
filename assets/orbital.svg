  <circle class="planet" cx="337" cy="250" r="7"  fill="#56d364" filter="url(#glow)" style="animation-delay:3.2s"/>
  <text text-anchor="end" x="314" y="264">
    <tspan class="label">Aug '25</tspan>
    <tspan class="label-count" dx="4">85</tspan>
  </text>

  <!-- i=9  Jul '25  35 commits  r=3   a=180°  pos=(320,185)  label=(295,185) -->
  <circle class="planet" cx="320" cy="185" r="3"  fill="#ff7b72" filter="url(#glow)" style="animation-delay:3.6s"/>
  <text text-anchor="end" x="295" y="189">
