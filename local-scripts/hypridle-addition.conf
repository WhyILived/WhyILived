# ─────────────────────────────────────────────────────────────────
# Add this LISTENER BLOCK to your ~/.config/hypr/hypridle.conf
# It fires the GitHub status scripts based on idle state.
#
# HOW IT WORKS:
#   on-timeout → after 10 min idle → marks you Offline
#   on-resume  → when you move mouse/type again → marks you Online
#
# The general block's lock_cmd / unlock_cmd fires on D-Bus lock events
# (e.g. when a locker calls loginctl lock-session). Adding both means
# you go Offline either when idle OR when you explicitly lock.
# ─────────────────────────────────────────────────────────────────

general {
    # Fires when session receives a D-Bus lock signal (any locker)
    lock_cmd   = ~/.local/bin/github-status-offline.sh
    unlock_cmd = ~/.local/bin/github-status-online.sh
}

listener {
    timeout    = 600   # 10 minutes of no input = Offline
    on-timeout = ~/.local/bin/github-status-offline.sh
    on-resume  = ~/.local/bin/github-status-online.sh
}
